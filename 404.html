<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page not found — The Record</title>
<style>
:root{
  --paper:#F2F3F0;
  --ink:#161B21;
  --ink-soft:#3D444D;
  --ink-faint:#7A8089;
  --rule:#C9CCC5;
  --seal-blue:#2C4A6E;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{
  background:var(--paper);
  color:var(--ink);
  font-family:'Spectral', Georgia, serif;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:2rem;
  line-height:1.5;
}
.wrap{max-width:32rem;}
.code{
  font-family:'IBM Plex Mono', Consolas, monospace;
  font-size:0.8rem;
  letter-spacing:0.18em;
  text-transform:uppercase;
  color:var(--ink-faint);
  margin-bottom:1.25rem;
}
h1{
  font-size:1.9rem;
  font-weight:600;
  margin-bottom:0.9rem;
}
p{
  color:var(--ink-soft);
  margin-bottom:1.75rem;
}
.rule{
  width:3rem;
  height:2px;
  background:var(--seal-blue);
  margin:0 auto 1.75rem;
}
a{
  font-family:'IBM Plex Mono', Consolas, monospace;
  font-size:0.85rem;
  color:var(--seal-blue);
  text-decoration:none;
  border-bottom:1px solid var(--rule);
  padding-bottom:2px;
}
a:hover{border-bottom-color:var(--seal-blue);}
</style>
</head>
<body>
  <div class="wrap">
    <div class="code">Error 404</div>
    <div class="rule"></div>
    <h1>This page could not be found.</h1>
    <p>The page you were looking for isn't here. It may have been moved, or the link may be incomplete.</p>
    <a href="/">Return to The Record</a>
  </div>
</body>
</html>
